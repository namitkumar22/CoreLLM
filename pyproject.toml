[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "corellm-engine"
version = "1.0.0"
description = "Python client for CoreLLM — LLM gateway running Ollama on Hugging Face Spaces"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "Namit Kumar" }]

keywords = ["llm", "ollama", "langchain", "langgraph", "huggingface", "ai"]

dependencies = [
    "httpx>=0.27",
    "langchain-core>=0.2",
]

[project.optional-dependencies]
# pip install corellm[langchain]  — installs full LangChain stack
langchain = [
    "langchain>=0.2",
    "langchain-core>=0.2",
]
# pip install corellm[all]  — everything including LangGraph
all = [
    "langchain>=0.2",
    "langchain-core>=0.2",
    "langgraph>=0.1",
]

[tool.setuptools]
# corellm.py is a single-file module at the root
py-modules = ["corellm"]
