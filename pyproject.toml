[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "corellm-engine"
version = "1.1.0"
description = "Python client for CoreLLM Engine — LLM gateway running Ollama on Hugging Face Spaces"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.10"
authors = [{ name = "Namit Kumar" }]

keywords = ["llm", "ollama", "langchain", "langgraph", "huggingface", "ai", "corellm-engine"]

dependencies = [
    "httpx>=0.27",
    "langchain-core>=0.2",
]

[project.optional-dependencies]
# pip install corellm-engine[langchain]
langchain = [
    "langchain>=0.2",
    "langchain-core>=0.2",
]
# pip install corellm-engine[all]
all = [
    "langchain>=0.2",
    "langchain-core>=0.2",
    "langgraph>=0.1",
]

[tool.setuptools]
# corellm_engine.py is a single-file module at the root
py-modules = ["corellm_engine"]
