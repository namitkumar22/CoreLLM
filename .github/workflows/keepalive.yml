name: Keep CoreLLM Space Alive

on:
  schedule:
    # Runs every 25 minutes — HF free spaces sleep after 30min of inactivity
    - cron: "*/25 * * * *"
  workflow_dispatch:
    # Also allows you to trigger it manually from GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping CoreLLM Space
        run: |
          echo "Pinging CoreLLM Space at: ${{ vars.SPACE_URL }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.SPACE_URL }}/ping")
          echo "Response status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✓ Space is alive"
          else
            echo "✗ Space returned status $STATUS — it may be rebuilding"
          fi
